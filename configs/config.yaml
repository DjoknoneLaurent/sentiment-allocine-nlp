project:
  name: "sentiment-allocine"
  version: "0.1.0"
  seed: 42

data:
  dataset_name: "allocine"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  max_length: 512
  test_size: 0.1

preprocessing:
  remove_html: true
  remove_urls: true
  normalize_accents: false
  lowercase: false
  remove_emojis: true
  min_length: 10

models:
  baseline:
    tfidf:
      max_features: 50000
      ngram_range: [1, 2]
      min_df: 2
      sublinear_tf: true
    logistic_regression:
      C: 1.0
      max_iter: 1000
    svm:
      C: 1.0
      kernel: "linear"
    naive_bayes:
      alpha: 1.0
  transformer:
    model_name: "camembert-base"
    num_labels: 2
    max_length: 256
    batch_size: 16
    num_epochs: 3
    learning_rate: 2.0e-5
    warmup_ratio: 0.1
    weight_decay: 0.01
    metric_for_best_model: "f1"

mlflow:
  tracking_uri: "./mlruns"
  experiment_name: "sentiment_allocine"

api:
  host: "0.0.0.0"
  port: 8000
  max_length: 512
